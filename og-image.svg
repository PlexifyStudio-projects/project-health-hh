<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Plexify Health — Compassionate care, delivered home.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F5F0" />
      <stop offset="60%" stop-color="#EAF2FE" />
      <stop offset="100%" stop-color="#FDEDE7" />
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D7FF9" />
      <stop offset="55%" stop-color="#34C77B" />
      <stop offset="100%" stop-color="#FF8B6B" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2D7FF9" stop-opacity="0.18" />
      <stop offset="70%" stop-color="#2D7FF9" stop-opacity="0" />
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="950" cy="180" r="280" fill="url(#glow)" />
  <circle cx="180" cy="520" r="220" fill="url(#glow)" />

  <g transform="translate(80, 100)">
    <rect width="92" height="92" rx="22" fill="url(#brand)" />
    <path d="M46 70 L28 47 a12 12 0 1 1 18 -14 a12 12 0 1 1 18 14 Z" fill="#FFFFFF" />
  </g>

  <text x="200" y="170" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="44" font-weight="700" fill="#1B2A3A" letter-spacing="-1">
    Plexify <tspan fill="#4A5A6E" font-weight="500">Health</tspan>
  </text>

  <text x="80" y="350" font-family="'Fraunces', 'Georgia', serif" font-size="92" font-weight="600" fill="#0F1A26" letter-spacing="-2.5">
    Compassionate care,
  </text>
  <text x="80" y="445" font-family="'Fraunces', 'Georgia', serif" font-style="italic" font-size="92" font-weight="500" fill="#0F1A26" letter-spacing="-2.5">
    delivered home.
  </text>

  <g transform="translate(80, 520)">
    <rect width="14" height="14" rx="7" fill="#2D7FF9" />
    <text x="28" y="12" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="500" fill="#4A5A6E">
      Skilled nursing  ·  Therapy  ·  Medical social work
    </text>
  </g>

  <text x="80" y="585" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="600" fill="#2D7FF9" letter-spacing="0.5">
    plexifyhealth.com
  </text>

  <g transform="translate(1020, 510)" opacity="0.85">
    <rect width="100" height="36" rx="18" fill="#FFFFFF" stroke="#E1E6EE" stroke-width="1.5" />
    <text x="50" y="23" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="600" fill="#1B2A3A" text-anchor="middle">
      California
    </text>
  </g>
</svg>
